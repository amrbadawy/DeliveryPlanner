name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SoftwareDeliveryPlanner.slnx

      - name: Build
        run: dotnet build SoftwareDeliveryPlanner.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test SoftwareDeliveryPlanner.Tests/SoftwareDeliveryPlanner.Tests.csproj --configuration Release --no-build

      - name: Architecture Tests
        run: dotnet test SoftwareDeliveryPlanner.ArchTests/SoftwareDeliveryPlanner.ArchTests.csproj --configuration Release --no-build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright Dependencies
        working-directory: SoftwareDeliveryPlanner.Blazor
        run: npm ci

      - name: Verify License Policy
        shell: pwsh
        run: .github/scripts/verify-licenses.ps1 -RootPath . -PolicyFile .github/license-policy.json

      - name: Playwright Smoke
        working-directory: SoftwareDeliveryPlanner.Blazor
        run: npm run test:e2e:smoke
