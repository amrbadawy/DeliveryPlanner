name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore SoftwareDeliveryPlanner.slnx

      - name: Build
        run: dotnet build SoftwareDeliveryPlanner.slnx --configuration Release --no-restore

      - name: Restore Aspire solution
        run: dotnet restore aspire/SoftwareDeliveryPlanner.Aspire.slnx

      - name: Build Aspire solution
        run: dotnet build aspire/SoftwareDeliveryPlanner.Aspire.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test SoftwareDeliveryPlanner.Tests/SoftwareDeliveryPlanner.Tests.csproj --configuration Release --no-build

      - name: Architecture Tests
        run: dotnet test SoftwareDeliveryPlanner.ArchTests/SoftwareDeliveryPlanner.ArchTests.csproj --configuration Release --no-build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: SoftwareDeliveryPlanner.Web/node_modules
          key: node-${{ runner.os }}-${{ hashFiles('SoftwareDeliveryPlanner.Web/package-lock.json') }}
          restore-keys: |
            node-${{ runner.os }}-

      - name: Install Playwright Dependencies
        working-directory: SoftwareDeliveryPlanner.Web
        run: npm ci

      - name: Verify License Policy
        shell: pwsh
        run: .github/scripts/verify-licenses.ps1 -RootPath . -PolicyFile .github/license-policy.json

      - name: Playwright Smoke
        working-directory: SoftwareDeliveryPlanner.Web
        run: npm run test:e2e:smoke
